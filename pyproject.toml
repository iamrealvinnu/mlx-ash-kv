[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mlx-ash-kv"
version = "3.0.0"
description = "Asynchronous Self-Healing KV Cache (ASH-KV) for Apple Silicon."
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "mlx>=0.18.0",
    "rich"
]

[tool.setuptools]
packages = ["mlx_ash_kv"]
package-dir = {"" = "src"}
