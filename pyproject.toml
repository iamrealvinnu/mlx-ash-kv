[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mlx-ash-kv"
version = "6.0.0"
description = "ASH-KV: Head-Specific Causal Pruning and Entropy-Driven Context Compaction for Apple Silicon."
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "mlx>=0.18.0",
    "rich",
    "numpy",
    "coremltools",
    "torch"
]

[tool.setuptools]
packages = ["mlx_ash_kv"]
package-dir = {"" = "src"}
