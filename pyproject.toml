[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mlx-ash-kv"
version = "4.1.1"
description = "Asynchronous Self-Healing KV Cache (ASH-KV) with ANE-Daemon Hardware Parallelism."
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "mlx>=0.18.0",
    "rich",
    "numpy",
    "coremltools",
    "torch"
]

[tool.setuptools]
packages = ["mlx_ash_kv"]
package-dir = {"" = "src"}
